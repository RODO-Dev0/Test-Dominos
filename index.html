<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>دۆمینە</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── ROOT ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#050810;--bg1:#080d18;--bg2:#0d1525;--bg3:#141f30;--bg4:#1c2a3e;
  --a1:#c9a84c;--a2:#f0cb7a;--a1r:201,168,76;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.14);
  --tx:#e8e0d4;--tx2:rgba(232,224,212,0.58);--tx3:rgba(232,224,212,0.28);
  --tf:#f5efd8;--tf2:#f8f0d5;--ts:#c8b888;--tp:#1a0e06;--tb:#0f1e30;
  --rd:#e05252;--gn:#4abf7a;--bl:#4a90e4;
  --r:10px;--rl:16px;--rxl:22px;
  --tS:34;
}
body.ct-light{--bg0:#f0ebe0;--bg1:#e8e0d4;--bg2:#ddd6c8;--bg3:#d0c8b8;--bg4:#c4bca8;--bd:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.18);--tx:#1a1208;--tx2:rgba(26,18,8,0.6);--tx3:rgba(26,18,8,0.3);--tb:#c8b888}
body.ct-purple{--bg0:#070514;--bg1:#0d0a20;--bg2:#14102e;--bg3:#1c163e;--bg4:#241e50;--a1:#b87fff;--a2:#d4b0ff;--a1r:184,127,255;--tx:#ede8ff;--tx2:rgba(237,232,255,0.58);--tx3:rgba(237,232,255,0.28);--tp:#1a0a3e}
body.ct-green{--bg0:#020e08;--bg1:#041408;--bg2:#071c0e;--bg3:#0d2816;--bg4:#14361e;--a1:#4abf7a;--a2:#7de0a8;--a1r:74,191,122;--tx:#e0f5ea;--tx2:rgba(224,245,234,0.58);--tx3:rgba(224,245,234,0.28);--tp:#011a0a}
body.ct-blue{--bg0:#020814;--bg1:#040e1e;--bg2:#07162a;--bg3:#0e2038;--bg4:#162b4a;--a1:#4a90e4;--a2:#7ab8ff;--a1r:74,144,228;--tx:#e0ecff;--tx2:rgba(224,236,255,0.58);--tx3:rgba(224,236,255,0.28);--tp:#020e28}
body.ct-rose{--bg0:#120508;--bg1:#1e0810;--bg2:#2a0e18;--bg3:#381624;--bg4:#481e30;--a1:#e87a9a;--a2:#ffaac4;--a1r:232,122,154;--tx:#ffe8f0;--tx2:rgba(255,232,240,0.58);--tx3:rgba(255,232,240,0.28);--tp:#280818}
body.ct-amber{--bg0:#0c0800;--bg1:#180e00;--bg2:#241500;--bg3:#321e00;--bg4:#402800;--a1:#e8a832;--a2:#ffd06e;--a1r:232,168,50;--tx:#fff5e0;--tx2:rgba(255,245,224,0.58);--tx3:rgba(255,245,224,0.28);--tp:#1a0e00}
body.ct-kurd{--bg0:#0a0505;--bg1:#140a08;--bg2:#1e1008;--bg3:#2a1408;--bg4:#361808;--a1:#d4a017;--a2:#f0c840;--a1r:212,160,23;--tx:#fff8e8;--tx2:rgba(255,248,232,0.6);--tx3:rgba(255,248,232,0.28);--tp:#1a0800}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg0);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;transition:background .5s,color .3s;user-select:none;-webkit-user-select:none}
input,textarea{font-size:16px!important;-webkit-text-size-adjust:100%;user-select:text;-webkit-user-select:text}

/* ── GLASS ── */
/* ══════════════════════════════════════
   EFFECTS: MINIMAL
   Warm glow accent, bouncy tiles, golden borders
══════════════════════════════════════ */
body.gm-minimal{
  --eff-glow:rgba(var(--a1r),.22);
}
/* Every card/panel gets a warm accent border glow */
body.gm-minimal .sg,
body.gm-minimal .shop-item,
body.gm-minimal .home-btn,
body.gm-minimal .mcard,
body.gm-minimal .daily-day.today,
body.gm-minimal .auth-box{
  box-shadow:0 0 0 1px rgba(var(--a1r),.18), 0 4px 18px rgba(var(--a1r),.09);
  transition:box-shadow .3s,transform .25s;
}
body.gm-minimal .sg:hover,
body.gm-minimal .home-btn:hover{
  box-shadow:0 0 0 1px rgba(var(--a1r),.38), 0 8px 28px rgba(var(--a1r),.18);
  transform:translateY(-2px);
}
/* Settings screen: section headers glow */
body.gm-minimal .sgt{
  color:var(--a1);
  text-shadow:0 0 12px rgba(var(--a1r),.4);
}
/* Active radio option glows brighter */
body.gm-minimal .sopt.on{
  box-shadow:0 0 0 1.5px rgba(var(--a1r),.5), 0 4px 20px rgba(var(--a1r),.18)!important;
}
/* Tile bounce on hover */
body.gm-minimal .tw:not(.ct):not(.afd):not(.inv){
  transition:transform .26s cubic-bezier(.34,1.7,.64,1);
}
body.gm-minimal .tw:hover:not(.ct):not(.afd):not(.inv){
  transform:translateY(-10px) scale(1.08) rotate(-1.5deg);
}
/* Scrollbar accent */
body.gm-minimal ::-webkit-scrollbar-thumb{background:rgba(var(--a1r),.3)!important;border-radius:4px}
/* Top bar subtle glow line */
body.gm-minimal .top-bar,
body.gm-minimal .hdr{
  box-shadow:0 1px 0 rgba(var(--a1r),.25), 0 2px 12px rgba(var(--a1r),.08);
}
/* Chain area warm tint */
body.gm-minimal .chain-area{
  border-color:rgba(var(--a1r),.2)!important;
  background:rgba(var(--a1r),.025)!important;
}
/* Button glow */
body.gm-minimal .bpri{
  box-shadow:0 0 0 1px rgba(var(--a1r),.3),0 4px 20px rgba(var(--a1r),.2);
}

/* ══════════════════════════════════════
   EFFECTS: GLASS
   Full frosted glass, neon bloom, animated shimmer
══════════════════════════════════════ */
body.gm-glass{
  --eff-blur:blur(24px) saturate(180%) brightness(1.06);
}
/* Frosted glass on ALL panel surfaces */
body.gm-glass .sg,
body.gm-glass .home-btn,
body.gm-glass .shop-item,
body.gm-glass .mcard,
body.gm-glass .auth-box,
body.gm-glass .modal-box,
body.gm-glass .daily-day,
body.gm-glass .shop-bal-pill,
body.gm-glass .shop-bundle,
body.gm-glass .sopt{
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  background:rgba(255,255,255,.04)!important;
  border-color:rgba(255,255,255,.1)!important;
  box-shadow:0 0 0 1px rgba(255,255,255,.07), 0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);
}
body.gm-glass .sopt.on{
  background:rgba(var(--a1r),.12)!important;
  border-color:rgba(var(--a1r),.45)!important;
  box-shadow:0 0 0 1.5px rgba(var(--a1r),.4),0 0 24px rgba(var(--a1r),.2),inset 0 1px 0 rgba(255,255,255,.1)!important;
}
/* Neon glowing top bar */
body.gm-glass .top-bar,
body.gm-glass .hdr{
  background:rgba(5,8,18,.55)!important;
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-bottom-color:rgba(var(--a1r),.25)!important;
  box-shadow:0 1px 0 rgba(var(--a1r),.2), 0 4px 24px rgba(0,0,0,.5);
}
/* Section titles neon glow */
body.gm-glass .sgt{
  color:var(--a2);
  text-shadow:0 0 16px rgba(var(--a1r),.6), 0 0 40px rgba(var(--a1r),.25);
  letter-spacing:4px;
}
/* Tiles — constant neon glow even at rest */
body.gm-glass .tw:not(.ct):not(.afd):not(.inv){
  filter:drop-shadow(0 0 5px rgba(var(--a1r),.3)) drop-shadow(0 2px 6px rgba(0,0,0,.6));
  transition:transform .2s,filter .25s;
}
body.gm-glass .tw:hover:not(.ct):not(.afd):not(.inv){
  transform:translateY(-9px) scale(1.06);
  filter:drop-shadow(0 0 20px rgba(var(--a1r),.85)) drop-shadow(0 0 40px rgba(var(--a1r),.35)) drop-shadow(0 8px 14px rgba(0,0,0,.6))!important;
}
body.gm-glass .tw.sel{
  filter:drop-shadow(0 0 14px rgba(var(--a1r),.9)) drop-shadow(0 0 30px rgba(var(--a1r),.4))!important;
}
/* Chain area glass */
body.gm-glass .chain-area{
  background:rgba(0,0,0,.22)!important;
  backdrop-filter:blur(18px);
  border-color:rgba(var(--a1r),.18)!important;
  box-shadow:inset 0 0 40px rgba(0,0,0,.3);
}
/* Player area glass */
body.gm-glass .player-area{
  background:rgba(0,0,0,.28);
  backdrop-filter:blur(16px);
  border-top-color:rgba(var(--a1r),.22)!important;
}
/* Scrollbar neon */
body.gm-glass ::-webkit-scrollbar-thumb{background:rgba(var(--a1r),.45)!important;border-radius:4px;box-shadow:0 0 6px rgba(var(--a1r),.5)}
/* Neon accent line at very top of screen */
body.gm-glass::before{
  content:'';position:fixed;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(var(--a1r),.9) 40%,rgba(var(--a1r),1) 50%,rgba(var(--a1r),.9) 60%,transparent 100%);
  z-index:9999;pointer-events:none;
  animation:neonLine 3s ease-in-out infinite;
}
@keyframes neonLine{0%,100%{opacity:.7}50%{opacity:1;box-shadow:0 0 12px rgba(var(--a1r),.8)}}
/* Primary button in glass — glowing */
body.gm-glass .bpri,.gm-glass .aPrimBtn,.gm-glass .daily-claim-btn{
  box-shadow:0 0 0 1px rgba(var(--a1r),.4),0 4px 20px rgba(var(--a1r),.25),0 8px 32px rgba(0,0,0,.3);
}
body.no-anim *{animation-duration:.001ms!important;transition-duration:.001ms!important}

/* ── BG ── */
#bgc{position:fixed;inset:0;z-index:0;pointer-events:none;transition:opacity .6s}
body.bg-on #bgc{opacity:0}
#bgl{position:fixed;inset:0;z-index:0;pointer-events:none;background-size:cover;background-position:center;opacity:0;transition:opacity .7s,filter .4s}
body.bg-on #bgl{opacity:1}
body.bg-blur #bgl{filter:blur(var(--bgb,10px)) brightness(.52) saturate(1.2)}
body.bg-noblur #bgl{filter:brightness(.68)}
#bgl::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.4)}

/* ── SCREEN SYSTEM ── */
.scr{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;background:transparent;
  transition:opacity .35s cubic-bezier(.4,0,.2,1),transform .38s cubic-bezier(.4,0,.2,1);
  will-change:transform,opacity;}
/* Active — fully visible, no transform */
.scr.scr-active{opacity:1;transform:translateX(0) scale(1);pointer-events:all;}
/* Exiting left — slide out to left */
.scr.scr-exit-l{opacity:0;transform:translateX(-30%) scale(.96);pointer-events:none;}
/* Exiting right — slide out to right */
.scr.scr-exit-r{opacity:0;transform:translateX(30%) scale(.96);pointer-events:none;}
/* Entering from right — starts right, slides in */
.scr.scr-enter-r{opacity:0;transform:translateX(32%) scale(.97);pointer-events:none;}
/* Entering from left — starts left, slides in */
.scr.scr-enter-l{opacity:0;transform:translateX(-32%) scale(.97);pointer-events:none;}
/* Entering from bottom — slides up (modal-style for shop/settings/daily) */
.scr.scr-enter-up{opacity:0;transform:translateY(28%) scale(.97);pointer-events:none;}
/* Exiting to bottom */
.scr.scr-exit-down{opacity:0;transform:translateY(20%) scale(.96);pointer-events:none;}
/* Hard hidden — after animation completes */
.scr.gone{display:none!important;}
/* game screen */
#sg{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;opacity:0;transition:opacity .4s cubic-bezier(.4,0,.2,1);overflow:hidden}
#sg.on{opacity:1}

/* home top bar stays */
.home-top{display:flex;align-items:center;padding:10px 14px;background:rgba(6,10,20,.94);border-bottom:1px solid rgba(var(--a1r),.08);flex-shrink:0;gap:10px;transition:background .4s;box-shadow:0 1px 16px rgba(0,0,0,.3)}
.home-prof-pill{display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 10px;border:1px solid var(--bd2);border-radius:30px;background:rgba(255,255,255,.04);transition:all .2s}
.home-prof-pill:hover,.home-prof-pill:active{background:rgba(255,255,255,.08);border-color:rgba(var(--a1r),.3)}
.home-av{width:30px;height:30px;border-radius:50%;overflow:hidden;border:2px solid rgba(var(--a1r),.4);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.home-av img{width:100%;height:100%;object-fit:cover}
.home-av svg{width:16px;height:16px;stroke:var(--tx2);fill:none;stroke-width:1.5;stroke-linecap:round}
.home-info{display:flex;flex-direction:column;gap:1px}
.home-uname{font-size:12px;font-weight:600;color:var(--tx);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.home-rank{font-size:9px;color:var(--a1);display:flex;align-items:center;gap:3px}
.home-title{font-family:'Amiri',serif;font-size:20px;color:var(--a1);letter-spacing:2px;flex:1;text-align:center}
/* Daily badge dot */
.daily-badge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--rd);box-shadow:0 0 6px var(--rd);animation:dotPulse 1.5s ease-in-out infinite}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
/* Background screens get a subtle dim when a modal-style screen is on top */
.scr.scr-active + .scr,
.scr.scr-active{backface-visibility:hidden;-webkit-backface-visibility:hidden;}
/* When a modal-up screen is active, dim the previous one via a class */
#sh.dimmed,#sm.dimmed,#sq.dimmed{filter:brightness(.7);transition:filter .35s ease;}
/* Slide hint in bottom screens — subtle scale down of background */
.scr.scr-exit-down{transform-origin:center top;}
.top-bar{display:flex;align-items:center;padding:11px 14px;background:rgba(6,10,20,.96);border-bottom:1px solid rgba(var(--a1r),.1);flex-shrink:0;gap:10px;position:relative;z-index:2;transition:background .4s;box-shadow:0 1px 12px rgba(0,0,0,.35)}
.top-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;color:var(--a1);flex:1;text-align:center;text-transform:uppercase}
.iBtn{width:34px;height:34px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);flex-shrink:0;transition:all .2s;padding:0}
.iBtn:hover,.iBtn:active{background:rgba(var(--a1r),.1);color:var(--a1);border-color:rgba(var(--a1r),.3)}
.iBtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}
.scroll-body::-webkit-scrollbar{width:3px}
.scroll-body::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ════════════════════════════════════
   SCREEN 1: LANGUAGE
════════════════════════════════════ */
#sl{align-items:center;justify-content:center}
.lang-box{display:flex;flex-direction:column;align-items:center;gap:24px;padding:36px 28px;background:rgba(8,13,24,.88);border:1px solid rgba(var(--a1r),.22);border-radius:var(--rxl);width:min(360px,92vw)}
.lang-logo{display:flex;flex-direction:column;align-items:center;gap:6px}
.lang-sun{animation:sunR 24s linear infinite;transform-origin:center}
@keyframes sunR{to{transform:rotate(360deg)}}
.lang-name{font-family:'Amiri',serif;font-size:54px;font-weight:700;color:var(--a1);animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{from{text-shadow:0 0 28px rgba(var(--a1r),.28)}to{text-shadow:0 0 60px rgba(var(--a1r),.7)}}
.lang-tagline{font-family:'Cinzel',serif;font-size:9px;letter-spacing:6px;color:var(--tx3);text-transform:uppercase}
.lang-pick-label{font-size:12px;color:var(--tx2);letter-spacing:1px}
.lang-btns{display:flex;flex-direction:column;gap:9px;width:100%}
.lang-btn{width:100%;padding:14px 18px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);border-radius:14px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .25s}
.lang-btn:hover,.lang-btn:active{background:rgba(var(--a1r),.08);border-color:rgba(var(--a1r),.35);transform:translateY(-1px)}
.lang-icon{width:38px;height:38px;border-radius:50%;background:rgba(var(--a1r),.12);border:1px solid rgba(var(--a1r),.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lang-icon svg{width:20px;height:20px;stroke:var(--a1);fill:none;stroke-width:1.6;stroke-linecap:round}
.lang-text{display:flex;flex-direction:column;gap:1px;text-align:left}
.lang-main{font-size:16px;font-weight:600;color:var(--tx)}
.lang-sub{font-size:11px;color:var(--tx3)}
.lang-arrow{margin-left:auto;color:var(--tx3)}
.lang-arrow svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* ════════════════════════════════════
   SCREEN 2: AUTH
════════════════════════════════════ */
#sa{align-items:center;justify-content:center}
.auth-box{background:rgba(5,8,18,.92);border:1px solid rgba(var(--a1r),.18);border-radius:28px;padding:28px 24px;width:min(390px,93vw);display:flex;flex-direction:column;gap:14px;max-height:94vh;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05)}
.auth-box::-webkit-scrollbar{display:none}
.auth-logo-row{display:flex;align-items:center;gap:10px;cursor:pointer}
.auth-logo-row svg{color:var(--tx3);width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.auth-logo-row span{font-size:12px;color:var(--tx3)}
.auth-center{text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.auth-title{font-family:'Amiri',serif;font-size:40px;font-weight:700;color:var(--a1);letter-spacing:2px;animation:glow 3s ease-in-out infinite alternate}
.auth-sub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;color:var(--tx3);text-transform:uppercase}
.atabs{display:flex;border:1px solid var(--bd2);border-radius:var(--r);overflow:hidden}
.atab{flex:1;padding:11px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);background:transparent;border:none;font-family:'DM Sans',sans-serif;transition:all .2s}
.atab.on{background:rgba(var(--a1r),.15);color:var(--a1)}
.aform{display:flex;flex-direction:column;gap:11px}
.inp{padding:14px;background:var(--bg3);border:1.5px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;width:100%;-webkit-appearance:none;appearance:none;transition:border-color .2s}
.inp:focus{border-color:var(--a1)}
.inp::placeholder{color:var(--tx3)}
.inp.err{border-color:var(--rd)!important}
.emsg{font-size:11px;color:var(--rd);min-height:14px}
.aPrimBtn{padding:14px;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:var(--r);color:var(--bg0);font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-weight:700;transition:all .3s;width:100%;-webkit-appearance:none}
.aPrimBtn:active{transform:scale(.98)}
.aPrimBtn:disabled{opacity:.38;cursor:not-allowed}
.aSecBtn{padding:12px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;width:100%;-webkit-appearance:none;transition:all .2s}
/* step dots */
.dots{display:flex;gap:6px;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bd2);transition:all .3s}
.dot.done{background:rgba(var(--a1r),.5)}.dot.act{background:var(--a1);transform:scale(1.4)}
/* gender */
.grow{display:flex;gap:8px}
.gbtn{flex:1;padding:13px 4px;border:1px solid var(--bd);background:var(--bg2);border-radius:var(--r);cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.gbtn svg{width:22px;height:22px;stroke:var(--tx2);fill:none;stroke-width:1.5;stroke-linecap:round}
.gbtn span{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--tx2)}
.gbtn.on{border-color:rgba(var(--a1r),.5);background:rgba(var(--a1r),.08)}
.gbtn.on svg,.gbtn.on span{stroke:var(--a1);color:var(--a1)}
/* pfp grid */
.pfpGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-height:200px;overflow-y:auto;padding:2px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}
.pfpThumb{width:100%;aspect-ratio:1;border-radius:50%;object-fit:cover;border:2.5px solid var(--bd);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg3)}
.pfpThumb:hover,.pfpThumb:active{border-color:var(--bd2);transform:scale(1.06)}
.pfpThumb.on{border-color:var(--a1);box-shadow:0 0 0 2px rgba(var(--a1r),.35)}
.pfpThumb svg{width:24px;height:24px;stroke:var(--tx2);fill:none;stroke-width:1.5;stroke-linecap:round}
/* banner grid */
.bnGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bnThumb{width:100%;height:54px;border-radius:var(--r);border:2.5px solid var(--bd);cursor:pointer;transition:all .2s;background-size:cover;background-position:center;display:block}
.bnThumb.on{border-color:var(--a1)}

/* ════════════════════════════════════
   HOME — CLEAN LAYOUT
════════════════════════════════════ */
#sh{background:transparent;padding-bottom:70px}/* room for nav bar */
.home-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 20px 0;gap:24px;}
.home-logo{display:flex;flex-direction:column;align-items:center;gap:6px}
.home-big{font-family:'Amiri',serif;font-size:64px;font-weight:700;color:var(--a1);letter-spacing:3px;animation:glow 3s ease-in-out infinite alternate;line-height:1}
.home-tagline{font-family:'Cinzel',serif;font-size:8px;letter-spacing:7px;color:var(--tx3);text-transform:uppercase}

/* Big play CTA */
.home-play-cta{
  display:flex;align-items:center;gap:14px;
  padding:18px 52px;
  background:linear-gradient(135deg,var(--a1),var(--a2));
  border:none;border-radius:20px;
  color:var(--bg0);font-family:'Cinzel',serif;
  font-size:17px;letter-spacing:5px;font-weight:700;
  cursor:pointer;text-transform:uppercase;
  box-shadow:0 8px 32px rgba(var(--a1r),.45),0 2px 8px rgba(0,0,0,.3);
  transition:transform .22s cubic-bezier(.34,1.3,.64,1),box-shadow .22s;
  width:100%;max-width:300px;justify-content:center;
}
.home-play-cta:active{transform:scale(.96);}
.home-play-cta:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(var(--a1r),.55),0 4px 12px rgba(0,0,0,.3);}

/* Daily pill */
.home-daily-pill{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;
  background:rgba(74,191,122,.1);border:1px solid rgba(74,191,122,.3);
  border-radius:20px;cursor:pointer;
  font-size:12px;font-weight:600;color:#4abf7a;
  transition:all .2s;position:relative;
}
.home-daily-pill:active{transform:scale(.97);}

/* XP bar */
.home-xp-bar{width:100%;max-width:300px;display:flex;flex-direction:column;gap:5px;}
.home-xp-row{display:flex;justify-content:space-between;align-items:center;}
.home-xp-level{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:var(--a1);}
.home-xp-track{height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;width:100%;}
.home-xp-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* ── BOTTOM NAVIGATION BAR ── */
.home-nav{
  position:absolute;bottom:0;left:0;right:0;
  height:66px;
  background:rgba(6,10,20,.97);
  border-top:1px solid rgba(var(--a1r),.1);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:20;
  box-shadow:0 -4px 24px rgba(0,0,0,.4);
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;cursor:pointer;flex:1;
  transition:transform .18s cubic-bezier(.34,1.4,.64,1),color .18s;
  color:var(--tx3);position:relative;
}
.nav-item:active{transform:scale(.88);}
.nav-item:hover{color:var(--a1);}
.nav-ico{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.nav-ico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .18s;}
.nav-lbl{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:color .18s;}


/* ════════════════════════════════════
   SCREEN 4: GAME MODES
════════════════════════════════════ */
#sm{background:transparent}
.modes-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:18px;overflow:hidden}
.modes-hint{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);display:flex;align-items:center;gap:8px}
.modes-hint svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
/* swipe cards */
.cards-outer{width:100%;max-width:360px;overflow:hidden;position:relative}
.cards-track{display:flex;gap:14px;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform;padding:6px 2px}
.mcard{flex-shrink:0;width:calc(100% - 40px);background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--rxl);padding:26px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden}
.mcard:hover{border-color:rgba(var(--a1r),.35);background:var(--bg3)}
.mcard.mactive{border-color:var(--a1);background:rgba(var(--a1r),.06)}
.mcard-ico{width:60px;height:60px;border-radius:16px;background:rgba(var(--a1r),.1);border:1px solid rgba(var(--a1r),.2);display:flex;align-items:center;justify-content:center}
.mcard-ico svg{width:30px;height:30px;stroke:var(--a1);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.mcard-name{font-family:'Cinzel',serif;font-size:17px;font-weight:600;color:var(--tx);letter-spacing:1px;text-align:center}
.mcard-desc{font-size:11px;color:var(--tx2);text-align:center;line-height:1.65}
.mcard-badge{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;font-family:'Cinzel',serif}
.badge-avail{background:rgba(var(--a1r),.15);color:var(--a1);border:1px solid rgba(var(--a1r),.3)}
.badge-soon{background:rgba(196,90,90,.12);color:#c45a5a;border:1px solid rgba(196,90,90,.25)}
.mcard-lock{position:absolute;inset:0;background:rgba(0,0,0,.46);border-radius:inherit;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.mcard-lock svg{width:28px;height:28px;stroke:rgba(255,255,255,.5);fill:none;stroke-width:1.5;stroke-linecap:round}
.mcard-lock-txt{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.45);text-transform:uppercase}
/* dots */
.card-dots{display:flex;gap:8px}
.cdot{width:7px;height:7px;border-radius:50%;background:rgba(var(--a1r),.2);transition:all .3s;cursor:pointer}
.cdot.on{background:var(--a1);transform:scale(1.5);box-shadow:0 0 6px rgba(var(--a1r),.5)}
/* diff */
.diff-sec{display:flex;flex-direction:column;gap:9px;width:100%;max-width:340px;align-items:center}
.diff-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3)}
.diff-row{display:flex;gap:8px;width:100%}
.dfbtn{flex:1;padding:12px 4px;border:1px solid var(--bd);background:var(--bg2);border-radius:var(--r);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .2s}
.dfbtn:active{transform:scale(.96)}
.dfbtn svg{width:22px;height:22px;stroke:var(--tx2);fill:none;stroke-width:1.6;stroke-linecap:round}
.dfbtn span{font-size:11px;color:var(--tx2);font-weight:500}
.dfbtn.on{border-color:rgba(var(--a1r),.5);background:rgba(var(--a1r),.08)}
.dfbtn.on svg,.dfbtn.on span{stroke:var(--a1);color:var(--a1)}
.modes-play-btn{padding:15px 44px;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:var(--r);color:var(--bg0);font-family:'Cinzel',serif;font-size:14px;letter-spacing:4px;cursor:pointer;font-weight:700;transition:all .3s;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.modes-play-btn svg{width:18px;height:18px;stroke:var(--bg0);fill:var(--bg0)}
.modes-play-btn:active{transform:scale(.97)}
.modes-play-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ════════════════════════════════════
   SCREEN 5: PROFILE PAGE
════════════════════════════════════ */
#sp{background:transparent}
.prof-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

.prof-banner{position:relative;height:130px;background:var(--bg3);overflow:hidden;flex-shrink:0;}
.prof-banner-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;transition:background .4s;}
.bn-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;border-radius:inherit;}
.bn-status{position:absolute;bottom:8px;right:8px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;z-index:2;}
.bn-owned{background:rgba(74,191,122,.25);color:#4abf7a;border:1px solid rgba(74,191,122,.4);}
.bn-price{background:rgba(0,0,0,.6);color:#fff;backdrop-filter:blur(6px);}

.prof-av-wrap{position:absolute;bottom:-36px;left:20px;width:72px;height:72px;border-radius:50%;border:4px solid var(--bg1);overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.prof-av-wrap img{width:100%;height:100%;object-fit:cover}
.prof-av-wrap svg{width:32px;height:32px;stroke:var(--tx2);fill:none;stroke-width:1.4;stroke-linecap:round}
.prof-content{padding:46px 18px 28px;display:flex;flex-direction:column;gap:16px}
.prof-name-row{display:flex;align-items:flex-start;justify-content:space-between}
.prof-names{display:flex;flex-direction:column;gap:2px}
.prof-dn{font-size:20px;font-weight:700;color:var(--tx)}
.prof-un{font-size:12px;color:var(--tx3)}
.online-dot{width:12px;height:12px;border-radius:50%;background:var(--gn);border:2px solid var(--bg1);margin-top:4px}
.prof-badges{display:flex;gap:6px;flex-wrap:wrap}
.pbadge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px}
.pb-rank{background:rgba(var(--a1r),.15);color:var(--a1);border:1px solid rgba(var(--a1r),.3)}
.pb-gender{background:rgba(74,191,122,.12);color:#4abf7a;border:1px solid rgba(74,191,122,.25)}
.pb-player{background:rgba(74,144,196,.12);color:#4a90e4;border:1px solid rgba(74,144,196,.25)}
/* win rate */
.wr-card{padding:14px 16px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);display:flex;flex-direction:column;gap:8px}
.wr-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3)}
.wr-val{font-size:28px;font-weight:700;color:var(--a1)}
.wr-bar{height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.wr-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:4px;transition:width .8s ease}
/* rank card */
.rank-card{padding:14px 16px;background:linear-gradient(135deg,rgba(var(--a1r),.12),rgba(var(--a1r),.04));border:1px solid rgba(var(--a1r),.25);border-radius:var(--r);display:flex;align-items:center;gap:14px}
.rank-ico{width:48px;height:48px;border-radius:12px;background:rgba(var(--a1r),.12);border:1px solid rgba(var(--a1r),.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-ico svg{width:26px;height:26px;stroke:var(--a1);fill:none;stroke-width:1.6;stroke-linecap:round}
.rank-info{flex:1}
.rank-name{font-size:16px;font-weight:700;color:var(--a1)}
.rank-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.rank-next{font-size:10px;color:var(--tx3);margin-top:3px}
/* stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.stat-card{padding:12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);display:flex;flex-direction:column;gap:4px}
.stat-val{font-size:24px;font-weight:700;color:var(--a1)}
.stat-lbl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px}
.sec-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);padding-bottom:4px;border-bottom:1px solid var(--bd)}
.logout-btn{width:100%;padding:13px;background:rgba(224,82,82,.12);border:1.5px solid rgba(224,82,82,.3);border-radius:var(--r);color:var(--rd);cursor:pointer;font-size:12px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.logout-btn svg{width:16px;height:16px;stroke:var(--rd);fill:none;stroke-width:1.8;stroke-linecap:round}
.logout-btn:hover{background:rgba(224,82,82,.22)}

/* ════════════════════════════════════
   SCREEN 6: SHOP
════════════════════════════════════ */
#sq{background:transparent;display:flex;flex-direction:column}
.shop-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 20px}
.shop-ico-wrap{width:90px;height:90px;border-radius:24px;background:rgba(74,144,196,.1);border:1px solid rgba(74,144,196,.2);display:flex;align-items:center;justify-content:center}
.shop-title{font-family:'Cinzel',serif;font-size:22px;color:var(--a1);letter-spacing:3px}
.shop-sub{font-size:13px;color:var(--tx2);text-align:center;max-width:260px;line-height:1.7}
.shop-badge{padding:7px 20px;background:rgba(var(--a1r),.12);border:1px solid rgba(var(--a1r),.3);border-radius:20px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--a1);text-transform:uppercase}
.shop-body-new{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 40px}

/* ════════════════════════════════════
   SCREEN 7: SETTINGS
════════════════════════════════════ */
#ss{background:transparent;display:flex;flex-direction:column}
.sg{display:flex;flex-direction:column;gap:10px;padding:0 16px}
.sgt{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(var(--a1r),.55);padding-bottom:6px;border-bottom:1px solid rgba(var(--a1r),.1);margin:0 -16px;padding-left:16px;padding-right:16px;font-weight:600}
.sdiv{height:1px;background:rgba(255,255,255,.04);margin:0 4px}
.sopts{display:flex;flex-direction:column;gap:6px}
.sopt{display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid rgba(255,255,255,.06);border-radius:12px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.025)}
.sopt:hover{border-color:rgba(var(--a1r),.25);background:rgba(var(--a1r),.04)}
.sopt.on{border-color:rgba(var(--a1r),.4);background:rgba(var(--a1r),.08);box-shadow:0 0 0 1px rgba(var(--a1r),.15)}
.srad{width:14px;height:14px;border:1.5px solid var(--bd2);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .2s}
.sopt.on .srad{border-color:var(--a1);background:var(--a1)}
.sopt.on .srad::after{content:'';width:5px;height:5px;background:var(--bg0);border-radius:50%}
.son{font-size:12px;font-weight:500;color:var(--tx)}.sopt.on .son{color:var(--a1)}
.sod{font-size:10px;color:var(--tx3);line-height:1.5;margin-top:1px}
.strow{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r)}
.stl{font-size:12px;color:var(--tx);flex:1}
.stl-s{font-size:10px;color:var(--tx3);margin-top:1px}
.stg{position:relative;width:38px;height:21px;flex-shrink:0}
.stg input{opacity:0;width:0;height:0;position:absolute}
.stk{position:absolute;inset:0;background:var(--bg4);border-radius:11px;cursor:pointer;transition:background .25s;border:1px solid var(--bd2)}
.stg input:checked+.stk{background:var(--a1)}
.stk::before{content:'';position:absolute;width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.45);left:2px;top:2px;transition:transform .25s,background .25s}
.stg input:checked+.stk::before{transform:translateX(17px);background:#fff}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.csw{height:42px;border-radius:var(--r);cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px}
.csw.on{border-color:#fff}.csw span{font-size:8px;letter-spacing:1px;font-weight:600;text-transform:uppercase;color:rgba(255,255,255,.88);text-shadow:0 1px 4px rgba(0,0,0,.9);position:relative;z-index:1}
.csw-dark{background:linear-gradient(135deg,#050810,#141f30)}.csw-light{background:linear-gradient(135deg,#f0ebe0,#d0c8b8)}.csw-light span{color:rgba(0,0,0,.55);text-shadow:none}
.csw-purple{background:linear-gradient(135deg,#070514,#241e50)}.csw-green{background:linear-gradient(135deg,#020e08,#14361e)}
.csw-blue{background:linear-gradient(135deg,#020814,#162b4a)}.csw-rose{background:linear-gradient(135deg,#120508,#481e30)}
.csw-amber{background:linear-gradient(135deg,#0c0800,#402800)}.csw-kurd{background:linear-gradient(135deg,#8b0000 33%,#fff 33%,#fff 66%,#1a5c24 66%)}
.csw-kurd span{color:rgba(0,0,0,.65);text-shadow:0 1px 2px rgba(255,255,255,.5)}
.csw.on::after{content:'✓';position:absolute;top:2px;right:4px;font-size:9px;color:rgba(255,255,255,.95);text-shadow:0 1px 4px rgba(0,0,0,.9)}
.csw-light.on::after,.csw-kurd.on::after{color:rgba(0,0,0,.45);text-shadow:none}
.lang-row-s{display:flex;gap:5px}
.lbtn2{flex:1;padding:9px 4px;border:1px solid var(--bd);background:var(--bg2);border-radius:var(--r);cursor:pointer;font-size:11px;color:var(--tx2);text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif;line-height:1.4}
.lbtn2.on{border-color:rgba(var(--a1r),.5);color:var(--a1);background:rgba(var(--a1r),.08)}
.lsub2{font-size:9px;color:var(--tx3)}
.bgcats{display:flex;gap:4px;flex-wrap:wrap}
.bgcat{flex:1;min-width:55px;padding:7px 4px;border:1px solid var(--bd);background:var(--bg2);border-radius:var(--r);cursor:pointer;font-size:10px;color:var(--tx2);text-align:center;transition:all .2s}
.bgcat.on{border-color:rgba(var(--a1r),.5);color:var(--a1);background:rgba(var(--a1r),.08)}
.bgthumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.bgt{height:50px;border-radius:var(--r);cursor:pointer;border:2px solid var(--bd);overflow:hidden;background-size:cover;background-position:center;transition:all .2s;position:relative}
.bgt.on{border-color:var(--a1)}.bgt.on::after{content:'✓';position:absolute;top:3px;right:4px;font-size:10px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9)}
.bgt-anim{background:linear-gradient(135deg,var(--bg0),var(--bg3));display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;height:50px;border-radius:var(--r);cursor:pointer;border:2px solid var(--bd);transition:all .2s}
.bgt-anim svg{width:16px;height:16px;stroke:var(--tx3);fill:none;stroke-width:1.5;stroke-linecap:round}
.bgt-anim span{font-size:8px;letter-spacing:1px;color:var(--tx3);text-transform:uppercase}
.bgt-anim.on{border-color:var(--a1)}.bgt-anim.on svg,.bgt-anim.on span{stroke:var(--a1);color:var(--a1)}
.ssl-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r)}
.ssl-l{font-size:10px;color:var(--tx2);flex-shrink:0;min-width:44px}
.ssl{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--bd2);border-radius:2px;cursor:pointer;outline:none}
.ssl::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--a1);cursor:pointer}
.ssv{font-size:10px;color:var(--a1);min-width:28px;text-align:right}
.tsz-row{display:flex;gap:5px}
.tszBtn{flex:1;padding:9px 4px;border:1px solid var(--bd);background:var(--bg2);border-radius:var(--r);cursor:pointer;font-size:11px;color:var(--tx2);text-align:center;transition:all .2s}
.tszBtn.on{border-color:rgba(var(--a1r),.5);color:var(--a1);background:rgba(var(--a1r),.08)}
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.stcard{padding:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);text-align:center}
.stcard-v{font-size:20px;font-weight:700;color:var(--a1)}.stcard-l{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
/* instagram */
.insta-card{display:flex;align-items:center;gap:12px;padding:13px;background:linear-gradient(135deg,rgba(225,48,108,.1),rgba(253,121,36,.07));border:1px solid rgba(225,48,108,.22);border-radius:var(--r);cursor:pointer;text-decoration:none;transition:all .2s}
.insta-card:hover{background:linear-gradient(135deg,rgba(225,48,108,.18),rgba(253,121,36,.12));border-color:rgba(225,48,108,.4)}
.insta-ico{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,rgba(225,48,108,.2),rgba(253,121,36,.15));border:1px solid rgba(225,48,108,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.insta-ico svg{width:22px;height:22px;stroke:rgba(225,48,108,.9);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.insta-txt{flex:1}
.insta-name{font-size:13px;font-weight:600;color:var(--tx)}
.insta-handle{font-size:11px;color:rgba(225,48,108,.8);margin-top:1px}
.insta-arr svg{width:15px;height:15px;stroke:var(--tx3);fill:none;stroke-width:2;stroke-linecap:round}
.about-txt{font-size:12px;color:var(--tx2);line-height:1.8;padding:12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r)}
.ver-txt{text-align:center;font-size:10px;color:var(--tx3);letter-spacing:2px;padding:4px}
.settings-scroll{padding:16px 0 100px;display:flex;flex-direction:column;gap:20px}

/* ════════════════════════════════════
   GAME SCREEN
════════════════════════════════════ */
.hdr{display:flex;align-items:center;padding:6px 12px;background:rgba(6,10,20,.96);border-bottom:1px solid rgba(var(--a1r),.1);flex-shrink:0;gap:8px;z-index:2;position:relative;transition:background .4s;box-shadow:0 1px 12px rgba(0,0,0,.4)}
.hdr-prof{display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 7px;border-radius:var(--r);transition:background .2s}
.hdr-prof:hover{background:rgba(255,255,255,.06)}
.hdr-pfp{width:28px;height:28px;border-radius:50%;overflow:hidden;border:1.5px solid rgba(var(--a1r),.4);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-pfp img,.hdr-pfp svg{width:100%;height:100%;object-fit:cover}
.hdr-pfp svg{width:14px;height:14px;stroke:var(--tx2);fill:none;stroke-width:1.5;stroke-linecap:round}
.hdr-name{font-size:11px;color:var(--tx2);max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-scores{display:flex;gap:8px;flex:1;justify-content:center;align-items:center}
.spill{display:flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(var(--a1r),.07);border:1px solid rgba(var(--a1r),.18);border-radius:20px;font-size:10px}
.spill-v{font-weight:700;font-size:16px;color:var(--a1);font-family:'Cinzel',serif}
.tbadge{padding:3px 12px;border-radius:20px;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;flex-shrink:0;transition:all .35s;font-family:'Cinzel',serif}
.tb-p{background:rgba(74,191,122,.15);color:#4abf7a;border:1px solid rgba(74,191,122,.35);box-shadow:0 0 10px rgba(74,191,122,.12)}
.tb-a{background:rgba(224,82,82,.14);color:#e05252;border:1px solid rgba(224,82,82,.28);box-shadow:0 0 10px rgba(224,82,82,.1)}
.hdr-btns{display:flex;gap:5px}
.game-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ai-area{flex-shrink:0;padding:3px 8px 1px;display:flex;flex-direction:column;align-items:center;gap:2px}
.alabel{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(var(--a1r),.5);display:flex;align-items:center;gap:6px;width:100%}
.alabel::before,.alabel::after{content:'';flex:1;height:1px;background:rgba(var(--a1r),.12)}
.ai-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;min-height:24px;align-items:center}
.ai-info{font-size:9px;color:var(--tx2);min-height:12px}
/* ── CHAIN: real domino snake layout ── */
.chain-area{flex:1;margin:4px 8px;border:1px solid rgba(var(--a1r),.08);border-radius:var(--rl);background:rgba(3,6,14,.6);overflow:hidden;position:relative;min-height:70px;transition:border-color .2s,box-shadow .2s;box-shadow:inset 0 1px 0 rgba(255,255,255,.03),inset 0 0 30px rgba(0,0,0,.3)}
.chain-area.drop-ready{border-color:rgba(var(--a1r),.4)!important;box-shadow:inset 0 0 0 2px rgba(var(--a1r),.25),0 0 20px rgba(var(--a1r),.1)!important}
.chain-area.dol{border-color:rgba(var(--a1r),.35);box-shadow:0 0 16px rgba(var(--a1r),.12)}
.chain-area.derr{border-color:var(--rd)!important;box-shadow:inset 0 0 28px rgba(220,82,82,.2)!important}
/* chain-scroll is a positioned container for snake layout */
.chain-scroll{height:100%;overflow:hidden;position:relative;}
/* each tile wrapper absolutely positioned */
.ctile{position:absolute;transition:none;display:flex;align-items:center;justify-content:center;}
.ctile.tile-drop{animation:tileDrop .32s cubic-bezier(.34,1.5,.64,1);}
@keyframes tileDrop{from{opacity:0;transform:scale(.6) rotate(-6deg)}to{opacity:1;transform:none}}
.chain-empty{color:var(--tx3);font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;width:100%;flex:1}
.dz{border:2px dashed transparent;border-radius:8px;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
.dz.active{border-color:rgba(var(--a1r),.5);background:rgba(var(--a1r),.06)}
.dz.hot{border-color:var(--a1);background:rgba(var(--a1r),.14);animation:dzP .6s ease-in-out infinite;box-shadow:0 0 12px rgba(var(--a1r),.2)}
.dz svg{width:18px;height:18px;stroke:rgba(var(--a1r),.4);fill:none;stroke-width:2;stroke-linecap:round;opacity:0;transition:opacity .2s}
.dz.active svg,.dz.hot svg{opacity:1}
.dz svg{width:16px;height:16px;stroke:rgba(var(--a1r),.6);fill:none;stroke-width:2;stroke-linecap:round;opacity:0;transition:opacity .2s}
.dz.active svg,.dz.hot svg{opacity:1}
@keyframes dzP{0%,100%{background:rgba(var(--a1r),.07)}50%{background:rgba(var(--a1r),.16)}}
@keyframes tileIn{0%{opacity:0;transform:scale(.85) translateY(-12px)}100%{opacity:1;transform:none}}
.tile-in{animation:tileIn .26s cubic-bezier(.34,1.5,.64,1) forwards}
.status-bar{flex-shrink:0;padding:4px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(0,0,0,.15)}
.smsg{font-size:11px;color:var(--tx2);flex:1;text-align:center;min-height:16px;transition:color .3s;letter-spacing:.3px}
.smsg.ok{color:var(--gn);font-weight:600}.smsg.warn{color:var(--rd);font-weight:600}
.byi{font-size:10px;color:var(--tx3);display:flex;align-items:center;gap:4px;flex-shrink:0}
.byc{color:var(--a1);font-weight:700;font-size:12px}
.ctrls{display:flex;gap:6px;flex-shrink:0}
.bsm{padding:6px 14px;border-radius:20px;border:1px solid rgba(var(--a1r),.2);background:rgba(var(--a1r),.07);color:var(--a1);cursor:pointer;font-size:10px;font-family:'Cinzel',serif;transition:all .2s;font-weight:600;letter-spacing:1px;-webkit-appearance:none}
.bsm:hover:not(:disabled){background:rgba(var(--a1r),.16);border-color:rgba(var(--a1r),.45)}
.bsm:disabled{opacity:.25;cursor:not-allowed}
.player-area{flex-shrink:0;padding:4px 9px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;border-top:1px solid rgba(var(--a1r),.1);transition:all .4s;background:rgba(0,0,0,.12)}
.player-hand{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;align-items:flex-end;min-height:44px}
/* Valid tile pulse glow */
/* valid tile: subtle top border highlight only, no glow */
.tw.valid-tile svg rect:first-child{stroke:rgba(74,191,122,.55)!important;stroke-width:2px!important;}
/* Invalid/unplayable tile */
.tw.inv{opacity:.28;cursor:not-allowed;}
/* Dragging tile ghost */
.tw.dragging{opacity:.35;transform:scale(.95);}
/* TILES — standing upright */
.tw{cursor:grab;transition:transform .2s cubic-bezier(.34,1.2,.64,1),filter .2s;flex-shrink:0}
.tw:active{cursor:grabbing}
.tw:hover:not(.ct):not(.afd):not(.inv){transform:translateY(-7px) scale(1.04)}
.tw.inv{opacity:.3;cursor:not-allowed}.tw.inv:hover{transform:none!important}
.tw.afd,.tw.ct{cursor:default}.tw.afd:hover,.tw.ct:hover{transform:none!important}
.tw.dragging{opacity:.4;transform:scale(.9)!important}
/* AI thinking */
.ait{display:none;align-items:center;gap:5px;font-size:10px;color:rgba(var(--a1r),.6);font-style:italic;letter-spacing:.5px}
.ait.on{display:flex}
.td{width:5px;height:5px;border-radius:50%;background:var(--a1);opacity:.3;animation:tdp 1.2s ease-in-out infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tdp{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}
/* ── GAME HAMBURGER MENU ── */
#game-menu-drop{
  position:fixed;top:52px;right:10px;z-index:500;
  background:var(--bg2);border:1px solid rgba(var(--a1r),.25);
  border-radius:var(--rl);padding:6px;min-width:180px;
  box-shadow:0 8px 32px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04);
  animation:menuIn .22s cubic-bezier(.34,1.4,.64,1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
@keyframes menuIn{from{opacity:0;transform:translateY(-8px) scale(.95)}to{opacity:1;transform:none}}
.gmd-item{
  display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:8px;
  cursor:pointer;font-size:13px;font-weight:500;color:var(--tx);
  transition:background .15s,color .15s;
}
.gmd-item:hover,.gmd-item:active{background:rgba(var(--a1r),.1);color:var(--a1);}
.gmd-item:hover svg,.gmd-item:active svg{stroke:var(--a1);}
.gmd-item svg{width:16px;height:16px;stroke:var(--tx2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:stroke .15s}
.gmd-exit,.gmd-exit svg{color:var(--rd)!important;stroke:var(--rd)!important;}
.gmd-exit:hover,.gmd-exit:active{background:rgba(224,82,82,.1)!important;}
.gmd-div{height:1px;background:var(--bd);margin:4px 0;}

/* ── GAME PROFILE POPUP ── */
#game-profile-overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#game-profile-overlay.on{opacity:1;pointer-events:all;}
#game-profile-popup{
  position:fixed;left:50%;bottom:-100%;z-index:610;
  transform:translateX(-50%);
  width:min(360px,94vw);
  background:var(--bg1);
  border:1px solid rgba(var(--a1r),.18);
  border-radius:24px 24px 0 0;
  overflow:hidden;
  transition:bottom .4s cubic-bezier(.34,1.08,.64,1);
  box-shadow:0 -12px 50px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
}
#game-profile-popup.on{bottom:0;}
/* Banner */
#gpp-banner{
  height:110px;
  background:linear-gradient(135deg,var(--bg3),var(--bg4));
  background-size:cover;background-position:center;
  position:relative;flex-shrink:0;
}
#gpp-banner-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.55) 100%);
}
/* Avatar ring */
#gpp-av-wrap{
  position:absolute;
  left:50%;transform:translateX(-50%);
  bottom:-34px;z-index:2;
}
#gpp-frame-ring{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--a1),var(--a2));
  padding:3px;
  box-shadow:0 4px 20px rgba(var(--a1r),.5),0 0 0 3px var(--bg1);
  animation:profileRingPulse 2.5s ease-in-out infinite;
}
@keyframes profileRingPulse{0%,100%{box-shadow:0 4px 20px rgba(var(--a1r),.4),0 0 0 3px var(--bg1)}50%{box-shadow:0 4px 28px rgba(var(--a1r),.7),0 0 0 3px var(--bg1)}}
#gpp-av{
  width:100%;height:100%;border-radius:50%;
  background:var(--bg3);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
}
#gpp-av svg{width:55%;height:55%;stroke:var(--tx2);fill:none;stroke-width:1.5;stroke-linecap:round}
#gpp-av img{width:100%;height:100%;object-fit:cover}
/* Content area */
#gpp-content{
  padding:44px 20px 24px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
#gpp-name{
  font-size:20px;font-weight:700;color:var(--tx);
  font-family:'Cinzel',serif;letter-spacing:1px;
  text-align:center;
}
#gpp-user{font-size:12px;color:var(--tx3);margin-top:-4px;}
#gpp-badges{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:2px;}
.gpp-badge{padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;}
.gpp-badge-rank{background:rgba(var(--a1r),.15);color:var(--a1);border:1px solid rgba(var(--a1r),.3);}
.gpp-badge-gender{background:rgba(255,255,255,.06);color:var(--tx2);border:1px solid var(--bd);}
/* Win rate bar */
#gpp-wr-wrap{width:100%;margin-top:4px;}
#gpp-wr-label{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:5px;}
#gpp-wr-label span:last-child{color:var(--a1);font-weight:700;}
#gpp-wr-track{width:100%;height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;}
#gpp-wr-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:4px;width:0%;transition:width .7s cubic-bezier(.4,0,.2,1);}
/* Stats */
#gpp-stats{
  display:flex;align-items:center;width:100%;
  background:var(--bg2);border-radius:14px;
  border:1px solid var(--bd);overflow:hidden;
  margin-top:4px;
}
.gpp-stat{flex:1;text-align:center;padding:13px 4px;}
.gpp-stat-div{width:1px;height:36px;background:var(--bd);flex-shrink:0;}
.gpp-sv{font-size:22px;font-weight:800;line-height:1;}
.gpp-sv-win{color:#4abf7a;}
.gpp-sv-loss{color:#e05252;}
.gpp-sv-draw{color:#4a90e4;}
.gpp-sv-foul{color:var(--a1);}
.gpp-sl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
/* Economy */
#gpp-eco{
  display:flex;gap:10px;width:100%;margin-top:2px;
}
.gpp-eco-pill{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:10px;border-radius:12px;
  background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.2);
  font-size:15px;font-weight:700;color:#f0c840;
}
.gpp-eco-gem{
  background:rgba(100,160,255,.08);border-color:rgba(100,160,255,.2);color:#88c0ff;
}
/* Close */
.gpp-close{
  width:100%;padding:13px;border-radius:12px;
  border:1px solid var(--bd2);
  background:var(--bg3);color:var(--tx2);cursor:pointer;font-size:13px;
  font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;
  margin-top:4px;
}
.gpp-close:hover,.gpp-close:active{background:var(--bg4);color:var(--tx);}

/* ── PASS PHONE OVERLAY (2P) ── */
#pass-phone-overlay{
  position:fixed;inset:0;z-index:1800;
  background:var(--bg0);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
#pass-phone-overlay.on{opacity:1;pointer-events:all;}
#ppo-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:14px;padding:32px 28px;
  background:var(--bg2);border:1px solid rgba(var(--a1r),.2);
  border-radius:var(--rxl);width:min(320px,90vw);
  text-align:center;
  animation:prizeIn .4s cubic-bezier(.34,1.2,.64,1);
}
#ppo-icon{font-size:52px;animation:ppoRock .8s ease-in-out infinite alternate;}
@keyframes ppoRock{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
#ppo-title{
  font-family:'Cinzel',serif;font-size:18px;letter-spacing:3px;
  color:var(--a1);text-transform:uppercase;
}
#ppo-sub{font-size:14px;color:var(--tx);line-height:1.6;}
#ppo-sub strong{color:var(--a1);}
#ppo-hint{
  font-size:11px;color:var(--tx3);letter-spacing:1px;
  padding:8px 14px;background:rgba(var(--a1r),.06);
  border-radius:8px;border:1px solid rgba(var(--a1r),.12);
}
#ppo-btn{
  width:100%;padding:15px;margin-top:4px;
  background:linear-gradient(135deg,var(--a1),var(--a2));
  border:none;border-radius:var(--r);
  color:var(--bg0);font-family:'Cinzel',serif;
  font-size:13px;letter-spacing:2px;font-weight:700;
  cursor:pointer;text-transform:uppercase;transition:all .2s;
}
#ppo-btn:active{transform:scale(.97);}

/* ══════════════════════════════════════
   LOADING SCREENS — 5 VARIANTS
══════════════════════════════════════ */
#loading-screen{
  position:fixed;inset:0;z-index:2000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .4s ease;
  overflow:hidden;
  background:var(--bg0);
}
#loading-screen.on{opacity:1;pointer-events:all;}
#ls-inner{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  position:relative;z-index:2;
}

/* ─── SHARED elements ─── */
.ls-wordmark{
  font-family:'Amiri',serif;font-weight:700;color:var(--a1);
  letter-spacing:4px;line-height:1;
}
.ls-hint{
  font-size:10px;color:var(--tx3);letter-spacing:4px;
  text-transform:uppercase;font-family:'Cinzel',serif;
}

/* ═══════════════════════════════
   V1 — SPINNING DOMINO TILE
   A single domino spins on its center axis like a coin flip
═══════════════════════════════ */
.ls-v1 .ls-coin-wrap{
  width:60px;height:100px;perspective:400px;
}
.ls-v1 .ls-coin{
  width:100%;height:100%;
  transform-style:preserve-3d;
  animation:lsCoinFlip 1.8s cubic-bezier(.45,0,.55,1) infinite;
}
@keyframes lsCoinFlip{
  0%   {transform:rotateY(0deg)}
  45%  {transform:rotateY(170deg)}
  55%  {transform:rotateY(190deg)}
  100% {transform:rotateY(360deg)}
}
.ls-v1 .ls-coin-face{
  position:absolute;inset:0;
  background:linear-gradient(150deg,#f8f2e0 0%,#ede0b8 50%,#f5eac8 100%);
  border:2.5px solid #c4a84a;border-radius:8px;
  backface-visibility:hidden;
  display:grid;grid-template-rows:1fr 1fr;
  box-shadow:0 6px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.4);
}
.ls-v1 .ls-coin-back{
  transform:rotateY(180deg);
  background:linear-gradient(150deg,#1a0e06,#2a1a08);
  border-color:#5a3a10;
}
.ls-v1 .ls-coin-half{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;position:relative;}
.ls-v1 .ls-coin-half::after{content:'';position:absolute;bottom:0;left:6px;right:6px;height:1px;background:rgba(0,0,0,.15);}
.ls-v1 .ls-coin-face .ls-coin-half:last-child::after{display:none;}
.ls-v1 .ls-cp{width:9px;height:9px;border-radius:50%;background:#1a0e06;box-shadow:inset 0 1px 0 rgba(255,255,255,.1);}
.ls-v1 .ls-wordmark{font-size:52px;animation:glow 2s ease-in-out infinite alternate;}
.ls-v1 #ls-msg{font-size:10px;color:var(--tx3);letter-spacing:4px;text-transform:uppercase;}

/* ═══════════════════════════════
   V2 — FALLING DOMINOES LINE
   5 tiles fall like a domino chain, one by one
═══════════════════════════════ */
.ls-v2 .ls-fall-row{
  display:flex;align-items:flex-end;gap:3px;height:90px;
}
.ls-v2 .ls-ft{
  width:26px;
  background:linear-gradient(160deg,#f8f2e0,#e8d8b0);
  border:2px solid #c8a84a;
  border-radius:5px;
  position:relative;
  transform-origin:bottom center;
  box-shadow:2px 4px 12px rgba(0,0,0,.4);
}
.ls-v2 .ls-ft::after{content:'';position:absolute;left:3px;right:3px;top:50%;height:1.5px;background:rgba(0,0,0,.15);}
/* Each tile has a different height and falls at a different time */
.ls-v2 .ls-ft:nth-child(1){height:70px;animation:lsFall 2s ease-in-out infinite 0s;}
.ls-v2 .ls-ft:nth-child(2){height:78px;animation:lsFall 2s ease-in-out infinite .18s;}
.ls-v2 .ls-ft:nth-child(3){height:85px;animation:lsFall 2s ease-in-out infinite .36s;}
.ls-v2 .ls-ft:nth-child(4){height:78px;animation:lsFall 2s ease-in-out infinite .54s;}
.ls-v2 .ls-ft:nth-child(5){height:70px;animation:lsFall 2s ease-in-out infinite .72s;}
@keyframes lsFall{
  0%,30%{transform:rotate(0deg);opacity:1;}
  45%,85%{transform:rotate(75deg);opacity:.4;}
  95%,100%{transform:rotate(0deg);opacity:1;}
}
.ls-v2 .ls-wordmark{font-size:48px;animation:glow 2s ease-in-out infinite alternate;}
.ls-v2 .ls-dots3{display:flex;gap:8px;}
.ls-v2 .ls-d3{width:7px;height:7px;border-radius:50%;background:var(--a1);opacity:.2;animation:tdp 1.2s ease-in-out infinite;}
.ls-v2 .ls-d3:nth-child(2){animation-delay:.2s;}
.ls-v2 .ls-d3:nth-child(3){animation-delay:.4s;}

/* ═══════════════════════════════
   V3 — MORPHING DOUBLE-SIX
   A domino tile draws its pips one by one
═══════════════════════════════ */
.ls-v3 .ls-morph-tile{
  width:56px;height:96px;
  background:linear-gradient(160deg,#f8f2e0,#ede0b8);
  border:2.5px solid #c8a84a;border-radius:9px;
  position:relative;
  box-shadow:0 8px 28px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.35);
  animation:lsTilePulse 2s ease-in-out infinite;
}
@keyframes lsTilePulse{
  0%,100%{box-shadow:0 8px 28px rgba(0,0,0,.5),0 0 0 0 rgba(var(--a1r),0)}
  50%{box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 8px rgba(var(--a1r),.12)}
}
.ls-v3 .ls-morph-tile::after{
  content:'';position:absolute;left:5px;right:5px;top:50%;
  height:2px;background:linear-gradient(90deg,transparent,rgba(0,0,0,.15),transparent);
}
.ls-v3 .ls-half{
  position:absolute;left:0;right:0;height:50%;
  display:grid;grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr;
  padding:7px 6px;gap:3px;
}
.ls-v3 .ls-half.top{top:0;}
.ls-v3 .ls-half.bot{bottom:0;}
.ls-v3 .ls-pp{
  width:8px;height:8px;border-radius:50%;
  background:#1a0e06;margin:auto;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1);
}
/* Pips appear one by one */
.ls-v3 .ls-pp:nth-child(1){animation:lsPipPop 2.4s ease-in-out infinite 0s;}
.ls-v3 .ls-pp:nth-child(2){animation:lsPipPop 2.4s ease-in-out infinite .2s;}
.ls-v3 .ls-pp:nth-child(3){animation:lsPipPop 2.4s ease-in-out infinite .4s;}
.ls-v3 .ls-pp:nth-child(4){animation:lsPipPop 2.4s ease-in-out infinite .6s;}
.ls-v3 .ls-pp:nth-child(5){animation:lsPipPop 2.4s ease-in-out infinite .8s;}
.ls-v3 .ls-pp:nth-child(6){animation:lsPipPop 2.4s ease-in-out infinite 1s;}
.ls-v3 .ls-pp:nth-child(7){animation:lsPipPop 2.4s ease-in-out infinite 1.2s;}
.ls-v3 .ls-pp:nth-child(8){animation:lsPipPop 2.4s ease-in-out infinite 1.4s;}
.ls-v3 .ls-pp:nth-child(9){animation:lsPipPop 2.4s ease-in-out infinite 1.6s;}
.ls-v3 .ls-pp:nth-child(10){animation:lsPipPop 2.4s ease-in-out infinite 1.8s;}
.ls-v3 .ls-pp:nth-child(11){animation:lsPipPop 2.4s ease-in-out infinite 2s;}
.ls-v3 .ls-pp:nth-child(12){animation:lsPipPop 2.4s ease-in-out infinite 2.2s;}
@keyframes lsPipPop{
  0%,100%{transform:scale(0);opacity:0}
  15%,85%{transform:scale(1);opacity:1}
}
.ls-v3 .ls-wordmark{font-size:44px;animation:glow 2s ease-in-out infinite alternate;}
.ls-v3 .ls-hint{margin-top:-6px;}

/* ═══════════════════════════════
   V4 — SHUFFLING HAND
   Tiles slide in from the left like being dealt
═══════════════════════════════ */
.ls-v4 .ls-deal-row{
  display:flex;gap:6px;align-items:flex-end;
  position:relative;height:80px;
}
.ls-v4 .ls-deal-card{
  width:30px;height:52px;
  background:linear-gradient(150deg,#f8f2e0,#e8d8b0);
  border:2px solid #c8a84a;border-radius:6px;
  position:relative;
  box-shadow:2px 4px 12px rgba(0,0,0,.4);
  animation:lsDeal 1.8s ease-in-out infinite;
  transform:translateX(-60px);opacity:0;
}
.ls-v4 .ls-deal-card::after{content:'';position:absolute;left:4px;right:4px;top:50%;height:1.5px;background:rgba(0,0,0,.12);}
.ls-v4 .ls-deal-card:nth-child(1){animation-delay:.0s;}
.ls-v4 .ls-deal-card:nth-child(2){animation-delay:.2s;}
.ls-v4 .ls-deal-card:nth-child(3){animation-delay:.4s;}
.ls-v4 .ls-deal-card:nth-child(4){animation-delay:.6s;}
.ls-v4 .ls-deal-card:nth-child(5){animation-delay:.8s;}
.ls-v4 .ls-deal-card:nth-child(6){animation-delay:1s;}
.ls-v4 .ls-deal-card:nth-child(7){animation-delay:1.2s;}
@keyframes lsDeal{
  0%    {transform:translateX(-50px) rotate(-8deg);opacity:0;}
  25%,70%{transform:translateX(0) rotate(0deg);opacity:1;}
  90%,100%{transform:translateX(0) rotate(0deg);opacity:0;}
}
.ls-v4 .ls-deal-pips{position:absolute;inset:4px;display:grid;grid-template-columns:1fr 1fr;gap:2px;place-items:center;}
.ls-v4 .ls-dp{width:5px;height:5px;border-radius:50%;background:#1a0e06;}
.ls-v4 .ls-wordmark{font-size:48px;animation:glow 2s ease-in-out infinite alternate;}
.ls-v4 .ls-hint{margin-top:-6px;}

/* ═══════════════════════════════
   V5 — BONEYARD COUNT
   Numbers tick down like shuffling
═══════════════════════════════ */
.ls-v5 .ls-bone-wrap{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.ls-v5 .ls-bone-num{
  font-family:'Cinzel',serif;font-weight:800;
  font-size:72px;color:var(--a1);line-height:1;
  animation:lsNumTick 2.4s steps(1) infinite;
  text-shadow:0 0 40px rgba(var(--a1r),.4);
}
@keyframes lsNumTick{
  0%  {content:'28';}
  8%  {opacity:.3;}
  12% {opacity:1;}
}
/* We'll update the number via JS — the animation just flickers it */
.ls-v5 .ls-bone-label{
  font-size:9px;letter-spacing:5px;color:var(--tx3);
  text-transform:uppercase;font-family:'Cinzel',serif;
}
.ls-v5 .ls-bone-tiles{
  display:flex;gap:3px;
}
.ls-v5 .ls-bt{
  width:14px;height:24px;
  background:linear-gradient(160deg,#f5efd8,#e8d8b0);
  border:1.5px solid #c8a84a;border-radius:3px;
  animation:lsBtPop 2.4s ease-in-out infinite;
  box-shadow:1px 2px 6px rgba(0,0,0,.4);
}
.ls-v5 .ls-bt:nth-child(1){animation-delay:0s;}
.ls-v5 .ls-bt:nth-child(2){animation-delay:.12s;}
.ls-v5 .ls-bt:nth-child(3){animation-delay:.24s;}
.ls-v5 .ls-bt:nth-child(4){animation-delay:.36s;}
.ls-v5 .ls-bt:nth-child(5){animation-delay:.48s;}
.ls-v5 .ls-bt:nth-child(6){animation-delay:.60s;}
.ls-v5 .ls-bt:nth-child(7){animation-delay:.72s;}
@keyframes lsBtPop{
  0%,100%{transform:scaleY(1);background:linear-gradient(160deg,#f5efd8,#e8d8b0);}
  50%{transform:scaleY(.8);background:linear-gradient(160deg,#ede0b0,#d8c890);}
}
.ls-v5 .ls-wordmark{font-size:46px;animation:glow 1.8s ease-in-out infinite alternate;}
.ls-v5 .ls-hint{margin-top:-6px;}






/* ── END-OF-ROUND SUMMARY ── */
.summary-box{min-width:260px;gap:10px!important;}
.summary-ico-wrap{display:flex;justify-content:center;}
.m-ico{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(var(--a1r),.1);}
.summary-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--tx);text-align:center;}
.summary-sub{font-size:13px;color:var(--tx2);text-align:center;}
.summary-stats{display:flex;align-items:center;width:100%;background:var(--bg3);border-radius:14px;border:1px solid var(--bd);overflow:hidden;}
.sum-stat{flex:1;text-align:center;padding:12px 4px;}
.sum-sv{font-size:20px;font-weight:800;color:var(--a1);font-family:'Cinzel',serif;}
.sum-sl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.sum-div{width:1px;height:32px;background:var(--bd);flex-shrink:0;}
.summary-streak{display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.25);border-radius:12px;font-size:13px;font-weight:700;color:#ff9500;width:100%;justify-content:center;}
.win-rew-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.win-rew{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;}
.win-rew.coins{background:rgba(212,160,23,.15);color:#f0c840;border:1px solid rgba(212,160,23,.3);}
.win-rew.gems{background:rgba(100,160,255,.15);color:#88c0ff;border:1px solid rgba(100,160,255,.3);}


#ppo-timer-ring{position:relative;width:64px;height:64px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.ppo-ring-svg{position:absolute;inset:0;transform:rotate(-90deg);}
.ppo-ring-bg{fill:none;stroke:rgba(var(--a1r),.12);stroke-width:3;}
.ppo-ring-fill{fill:none;stroke:var(--a1);stroke-width:3;stroke-linecap:round;
  stroke-dasharray:100;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;}
#ppo-timer-num{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--a1);position:relative;z-index:2;}


/* ── IMPROVED GAME UI ── */

/* Score pills */
.score-pill{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;}
.score-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);font-weight:600;}
.score-val{font-size:18px;font-weight:800;color:var(--a1);font-family:'Cinzel',serif;line-height:1;}
#score-you{border-color:rgba(var(--a1r),.15);background:rgba(var(--a1r),.05);}
#score-cpu{border-color:rgba(255,255,255,.06);}

/* Foul button */
.foul-btn{color:var(--rd)!important;border-color:rgba(220,82,82,.25)!important;background:rgba(220,82,82,.06)!important;display:flex;gap:4px;}

/* AI area */
.ai-area{flex-shrink:0;padding:4px 10px 2px;display:flex;flex-direction:column;gap:3px;}
.ai-top-row{display:flex;align-items:center;gap:8px;padding:0 2px;}
.ai-hand-lbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);font-weight:600;}
.ai-pips-lbl{font-size:10px;color:var(--tx3);margin-left:auto;}
.ait{display:none;align-items:center;gap:3px;}
.ait.on{display:flex;}
.td{width:5px;height:5px;border-radius:50%;background:var(--a1);opacity:.3;animation:tdp 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.2s;}.td:nth-child(3){animation-delay:.4s;}
.ai-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;min-height:20px;align-items:center;}

/* Status bar */
.status-bar{flex-shrink:0;padding:4px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.1);}
.by-pill{display:flex;align-items:center;gap:4px;padding:3px 9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;flex-shrink:0;}
.byc{font-size:12px;font-weight:700;color:var(--tx2);}
.smsg{font-size:10px;color:var(--tx3);flex:1;text-align:center;min-height:14px;letter-spacing:.3px;}
.smsg.ok{color:var(--gn);font-weight:600;}.smsg.warn{color:var(--rd);font-weight:600;}
.ctrls{display:flex;gap:5px;flex-shrink:0;}

/* Control buttons — icon + text */
.ctrl-btn{
  display:flex;align-items:center;gap:4px;
  padding:5px 11px;border-radius:10px;
  border:1px solid rgba(var(--a1r),.18);
  background:rgba(var(--a1r),.06);
  color:var(--a1);cursor:pointer;
  font-size:10px;font-weight:600;
  font-family:'DM Sans',sans-serif;
  transition:all .18s;letter-spacing:.3px;
  -webkit-appearance:none;
}
.ctrl-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;flex-shrink:0;}
.ctrl-btn:hover:not(:disabled){background:rgba(var(--a1r),.14);border-color:rgba(var(--a1r),.4);}
.ctrl-btn:disabled{opacity:.22;cursor:not-allowed;}

/* Player hand area */
.player-area{flex-shrink:0;padding:4px 8px 10px;display:flex;flex-direction:column;gap:5px;border-top:1px solid rgba(var(--a1r),.08);background:rgba(0,0,0,.1);}
.hand-header{display:flex;align-items:center;justify-content:space-between;padding:0 2px;}
.hand-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);font-weight:600;}
.hand-count{font-size:10px;color:var(--tx3);}
.player-hand{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;align-items:flex-end;min-height:44px;}

/* Chain area */
.chain-area{flex:1;margin:3px 8px;border:1px solid rgba(255,255,255,.06);border-radius:var(--rl);background:rgba(2,5,12,.7);overflow:hidden;position:relative;min-height:70px;transition:border-color .2s,box-shadow .2s;}
.chain-area.drop-ready{border-color:rgba(var(--a1r),.35)!important;box-shadow:inset 0 0 0 1.5px rgba(var(--a1r),.15)!important;}
.chain-area.dol{border-color:rgba(var(--a1r),.25);}
.chain-area.derr{border-color:var(--rd)!important;box-shadow:inset 0 0 20px rgba(220,82,82,.15)!important;}
.chain-empty{color:var(--tx3);font-size:9px;letter-spacing:3px;text-transform:uppercase;}

/* Hand tile improvements */
.tw{cursor:grab;transition:transform .18s cubic-bezier(.34,1.3,.64,1);display:inline-flex;}
.tw:active{cursor:grabbing;}
.tw.dragging{opacity:.3;transform:scale(.92);}
.tw.inv{opacity:.22;cursor:not-allowed;}
/* Valid tile: subtle green stroke only */
.tw.valid-tile svg rect:first-child{stroke:rgba(74,191,122,.55)!important;stroke-width:2px!important;}
/* Hover lift — clean, no glow */
.player-hand .tw:not(.inv):hover{transform:translateY(-8px) scale(1.06);}


/* ── SHOP PFP GRID ── */
.shop-pfps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.shop-pfp-item{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:12px 8px;border-radius:14px;
  background:var(--bg2);border:1.5px solid var(--bd);
  cursor:pointer;transition:all .25s;
}
.shop-pfp-item:hover,.shop-pfp-item:active{border-color:rgba(var(--a1r),.4);transform:translateY(-2px);}
.shop-pfp-item.owned{border-color:rgba(74,191,122,.3);}
.shop-pfp-item.equipped{border-color:var(--a1);box-shadow:0 0 14px rgba(var(--a1r),.2);}
.shop-pfp-img{
  width:72px;height:72px;border-radius:50%;overflow:hidden;
  border:2px solid rgba(var(--a1r),.2);
  background:var(--bg3);
}
.shop-pfp-name{font-size:11px;font-weight:600;color:var(--tx);text-align:center;}
.shop-pfp-badge{font-size:10px;color:var(--gn);font-weight:700;}
.shop-pfp-price{font-size:11px;color:var(--a1);font-weight:700;}

/* FOUL banner */
#foul-banner{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:500;padding:9px 24px;background:rgba(200,40,40,.97);border:1px solid rgba(255,100,100,.35);border-radius:20px;font-size:12px;color:#fff;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;text-align:center;max-width:92vw;box-shadow:0 6px 20px rgba(200,40,40,.4);letter-spacing:.5px}
#foul-banner.on{opacity:1}
/* CHAT */
#chatBtn{position:fixed;bottom:78px;right:14px;z-index:90;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,rgba(var(--a1r),.9),rgba(var(--a1r),.7));border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(var(--a1r),.35);transition:all .3s}
#chatBtn.on{display:flex}
#chatBtn svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#chatNotif{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:#e05252;border:2px solid var(--bg0);font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center}
#chatNotif.on{display:flex}
#chatPanel{position:fixed;bottom:0;left:0;right:0;z-index:95;background:rgba(8,13,24,.97);border-top:1px solid rgba(var(--a1r),.2);transform:translateY(100%);transition:transform .38s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;max-height:55vh;min-height:220px}
#chatPanel.on{transform:translateY(0)}
.chat-hdr{display:flex;align-items:center;padding:10px 14px 8px;border-bottom:1px solid var(--bd);flex-shrink:0;gap:10px}
.chat-hdr-title{font-size:12px;font-weight:600;color:var(--tx);flex:1}
.chat-hdr-sub{font-size:10px;color:var(--tx3)}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}
.chat-msgs::-webkit-scrollbar{width:2px}.chat-msgs::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.cmsg{display:flex;flex-direction:column;gap:2px;max-width:80%}
.cmsg.mine{align-self:flex-end;align-items:flex-end}
.cmsg.theirs{align-self:flex-start;align-items:flex-start}
.cmsg.sys{align-self:center;align-items:center;max-width:100%}
.cbubble{padding:7px 11px;border-radius:14px;font-size:12px;line-height:1.5;word-break:break-word}
.cmsg.mine .cbubble{background:rgba(var(--a1r),.22);color:var(--tx);border-bottom-right-radius:4px;border:1px solid rgba(var(--a1r),.3)}
.cmsg.theirs .cbubble{background:var(--bg3);color:var(--tx2);border-bottom-left-radius:4px;border:1px solid var(--bd)}
.cmsg.sys .cbubble{background:rgba(196,90,90,.12);color:#e05252;border:1px solid rgba(196,90,90,.2);font-size:11px;text-align:center;border-radius:8px}
.cmeta{font-size:9px;color:var(--tx3);padding:0 4px}
.chat-inp-row{display:flex;gap:8px;padding:8px 12px 12px;border-top:1px solid var(--bd);flex-shrink:0;align-items:center}
.chatInp{flex:1;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--bd2);border-radius:20px;color:var(--tx);font-size:16px!important;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.chatInp:focus{border-color:var(--a1)}
.chatInp::placeholder{color:var(--tx3)}
.chat-send-btn{width:38px;height:38px;border-radius:50%;background:var(--a1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chat-send-btn:active{transform:scale(.93)}
.chat-send-btn svg{width:17px;height:17px;stroke:var(--bg0);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* MODALS */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:150;opacity:0;pointer-events:none;transition:opacity .3s}
#overlay.on{opacity:1;pointer-events:all}
.mwrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.88);z-index:160;opacity:0;pointer-events:none;transition:all .38s cubic-bezier(.34,1.2,.64,1)}
.mwrap.on{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
.modal-box{background:var(--bg1);border:1px solid rgba(var(--a1r),.22);border-radius:28px;padding:30px 28px;text-align:center;min-width:240px;display:flex;flex-direction:column;align-items:center;gap:12px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.06)}
.modal-ico{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.modal-ico svg{width:28px;height:28px;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.mt{font-family:'Cinzel',serif;font-size:17px;color:var(--a1);letter-spacing:2px}
.ms{font-size:11px;color:var(--tx2);line-height:1.6}
.mp{font-size:24px;font-weight:700;color:var(--tx)}
.mbs{display:flex;gap:7px;margin-top:4px;flex-wrap:wrap;justify-content:center}
.bpri{padding:12px 24px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--a1),var(--a2));color:var(--bg0);cursor:pointer;font-size:11px;letter-spacing:2px;font-family:'Cinzel',serif;transition:all .2s;font-weight:700;box-shadow:0 4px 16px rgba(var(--a1r),.3)}
.bpri:active{transform:scale(.96)}
.bpri:hover{box-shadow:0 6px 22px rgba(var(--a1r),.45);transform:translateY(-1px)}
@keyframes wf{0%{box-shadow:inset 0 0 0 transparent}30%{box-shadow:inset 0 0 60px rgba(var(--a1r),.22)}60%{box-shadow:inset 0 0 0 transparent}85%{box-shadow:inset 0 0 38px rgba(var(--a1r),.14)}100%{box-shadow:inset 0 0 0 transparent}}
.wf{animation:wf 1s ease}

/* ════════════════════════════════════
   ECONOMY: COINS & DIAMONDS
════════════════════════════════════ */
.econ-bar{display:flex;align-items:center;gap:8px;margin-left:auto}
.econ-pill{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:1px solid;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.econ-pill.coins{background:rgba(212,160,23,.12);border-color:rgba(212,160,23,.3);color:#f0c840}
.econ-pill.coins:hover{background:rgba(212,160,23,.22);border-color:rgba(212,160,23,.6)}
.econ-pill.gems{background:rgba(100,160,255,.12);border-color:rgba(100,160,255,.3);color:#88c0ff}
.econ-pill.gems:hover{background:rgba(100,160,255,.22);border-color:rgba(100,160,255,.6)}
.econ-pill svg{width:15px;height:15px;flex-shrink:0}
.econ-anim{animation:econPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes econPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
/* coin float effect */
.coin-float{position:fixed;font-size:15px;font-weight:700;color:#f0c840;pointer-events:none;z-index:9999;animation:cfloat 1.2s ease-out forwards}
@keyframes cfloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}
.gem-float{position:fixed;font-size:15px;font-weight:700;color:#88c0ff;pointer-events:none;z-index:9999;animation:cfloat 1.2s ease-out forwards}

/* ════════════════════════════════════
   DAILY REWARDS SCREEN
════════════════════════════════════ */
#sd{background:transparent}
.daily-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:18px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.daily-streak-card{width:100%;max-width:380px;background:linear-gradient(135deg,rgba(212,160,23,.18),rgba(240,200,64,.06));border:1px solid rgba(212,160,23,.3);border-radius:var(--rxl);padding:20px;display:flex;align-items:center;gap:16px}
