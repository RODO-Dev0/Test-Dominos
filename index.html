.daily-streak-ico{width:56px;height:56px;border-radius:50%;background:rgba(212,160,23,.18);border:2px solid rgba(212,160,23,.4);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.daily-streak-info{display:flex;flex-direction:column;gap:3px}
.daily-streak-num{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:#f0c840;line-height:1}
.daily-streak-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--tx2)}
.daily-streak-sub{font-size:11px;color:var(--tx3)}
.daily-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;width:100%;max-width:380px}
.daily-day{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 3px;border-radius:10px;border:1px solid var(--bd);background:var(--bg2);transition:all .25s;cursor:default;position:relative}
.daily-day.claimed{background:rgba(74,191,122,.07);border-color:rgba(74,191,122,.2)}
.daily-day.today{background:linear-gradient(135deg,rgba(212,160,23,.28),rgba(212,160,23,.06));border-color:var(--a1);box-shadow:0 0 14px rgba(212,160,23,.22),0 2px 8px rgba(212,160,23,.1);animation:todayPulse 2s ease-in-out infinite}
@keyframes todayPulse{0%,100%{box-shadow:0 0 10px rgba(212,160,23,.2)}50%{box-shadow:0 0 20px rgba(212,160,23,.4)}}
.daily-day.milestone{border-color:rgba(var(--a1r),.45);background:rgba(var(--a1r),.08)}
.daily-day.milestone::after{content:'';position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--a1);border-radius:50%;border:1.5px solid var(--bg0)}
.daily-day.missed{opacity:.38}
.daily-day-lbl{font-size:9px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase}
.daily-day-ico{font-size:18px}
.daily-day-val{font-size:9px;color:var(--a1);font-weight:700}
.daily-day-check{font-size:14px}
.daily-claim-btn{width:100%;max-width:380px;padding:17px;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:14px;color:var(--bg0);font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;cursor:pointer;font-weight:700;transition:all .3s;text-transform:uppercase;box-shadow:0 6px 24px rgba(var(--a1r),.35)}
.daily-claim-btn:disabled{opacity:.38;cursor:not-allowed;filter:grayscale(.6)}
.daily-claim-btn:not(:disabled):active{transform:scale(.97)}
.daily-next{font-size:11px;color:var(--tx3);text-align:center}

/* ════════════════════════════════════
   PRIZE / CHEST SCREEN
════════════════════════════════════ */
.prize-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.prize-overlay.on{opacity:1;pointer-events:all}
.prize-box{
  width:min(320px,90vw);
  background:linear-gradient(170deg,#0d1525 0%,#080d18 100%);
  border:1px solid rgba(var(--a1r),.3);
  border-radius:28px;
  padding:0 0 24px;
  display:flex;flex-direction:column;align-items:center;gap:0;
  animation:prizeIn .45s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 32px 80px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04);
  overflow:hidden;position:relative;
}
/* Rays burst behind icon */
.prize-box::before{
  content:'';
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:280px;height:220px;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(var(--a1r),.06) 10deg,transparent 20deg,rgba(var(--a1r),.04) 30deg,transparent 40deg,rgba(var(--a1r),.07) 50deg,transparent 60deg,rgba(var(--a1r),.05) 70deg,transparent 80deg,rgba(var(--a1r),.06) 90deg,transparent 100deg,rgba(var(--a1r),.04) 110deg,transparent 120deg,rgba(var(--a1r),.06) 130deg,transparent 140deg,rgba(var(--a1r),.05) 150deg,transparent 160deg,rgba(var(--a1r),.07) 170deg,transparent 180deg,rgba(var(--a1r),.04) 190deg,transparent 200deg,rgba(var(--a1r),.06) 210deg,transparent 220deg,rgba(var(--a1r),.05) 230deg,transparent 240deg,rgba(var(--a1r),.06) 250deg,transparent 260deg,rgba(var(--a1r),.04) 270deg,transparent 280deg,rgba(var(--a1r),.07) 290deg,transparent 300deg,rgba(var(--a1r),.05) 310deg,transparent 320deg,rgba(var(--a1r),.06) 330deg,transparent 340deg,rgba(var(--a1r),.04) 350deg,transparent 360deg);
  animation:raysRotate 8s linear infinite;
  opacity:.8;
  pointer-events:none;
}
@keyframes raysRotate{to{transform:translateX(-50%) rotate(360deg)}}
/* Top accent bar */
.prize-box::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--a1),var(--a2),var(--a1),transparent);
  animation:shimmer 2s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes prizeIn{from{transform:scale(.7) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
/* Prize icon area */
.prize-chest-area{
  width:100%;padding:30px 0 20px;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}
.prize-chest{
  font-size:72px;
  animation:chestPop .6s cubic-bezier(.34,1.8,.64,1);
  filter:drop-shadow(0 0 24px rgba(var(--a1r),.5));
  display:block;
}
@keyframes chestPop{
  0%{transform:scale(0) rotate(-15deg);opacity:0}
  70%{transform:scale(1.2) rotate(5deg)}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes chestBounce{0%{transform:scale(.4) rotate(-10deg)}60%{transform:scale(1.15) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
.prize-title{
  font-family:'Cinzel',serif;font-size:19px;font-weight:700;
  color:var(--a1);text-align:center;letter-spacing:1px;
  padding:0 20px;position:relative;z-index:1;
  animation:titleSlide .4s cubic-bezier(.4,0,.2,1) .15s both;
}
@keyframes titleSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.prize-sub{
  font-size:12px;color:var(--tx3);text-align:center;
  padding:2px 20px 0;position:relative;z-index:1;
}
.prize-rewards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:0 16px;position:relative;z-index:1;}
.prize-rewards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.prize-reward{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:14px 20px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  min-width:90px;flex:1;max-width:130px;
  animation:rewardPop .5s cubic-bezier(.34,1.56,.64,1) .3s both;
}
@keyframes rewardPop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:none}}
.prize-reward-ico{font-size:32px;line-height:1;}
.prize-reward-val{font-size:18px;font-weight:800;color:var(--a1);font-family:'Cinzel',serif;}
.prize-reward-lbl{font-size:9px;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;}
.prize-close-btn{
  width:calc(100% - 32px);margin:8px 16px 0;
  padding:16px;
  background:linear-gradient(135deg,var(--a1),var(--a2));
  border:none;border-radius:16px;
  color:var(--bg0);font-family:'Cinzel',serif;
  font-size:14px;letter-spacing:3px;font-weight:700;
  cursor:pointer;text-transform:uppercase;
  transition:transform .18s,box-shadow .18s;
  box-shadow:0 6px 24px rgba(var(--a1r),.4);
  position:relative;z-index:1;
}
.prize-close-btn:active{transform:scale(.97);box-shadow:0 2px 12px rgba(var(--a1r),.3);}

/* ════════════════════════════════════
   SHOP — FULL REDESIGN
════════════════════════════════════ */
.shop-body-new{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.shop-balance-bar{display:flex;gap:10px;margin-bottom:18px}
.shop-bal-pill{flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--r);border:1px solid;background:transparent}
.shop-bal-pill.c{border-color:rgba(212,160,23,.25);background:rgba(212,160,23,.06)}
.shop-bal-pill.g{border-color:rgba(100,160,255,.25);background:rgba(100,160,255,.06)}
.shop-bal-ico{font-size:22px}
.shop-bal-info{display:flex;flex-direction:column;gap:1px}
.shop-bal-val{font-size:17px;font-weight:700;color:var(--tx)}
.shop-bal-lbl{font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase}
.shop-sec-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.shop-sec-title::after{content:'';flex:1;height:1px;background:var(--bd)}
.shop-items{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px}
.shop-item{background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--rl);padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;transition:all .25s cubic-bezier(.34,1.2,.64,1);position:relative;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.shop-item:hover,.shop-item:active{border-color:rgba(var(--a1r),.4);background:var(--bg3);transform:translateY(-3px) scale(1.01);box-shadow:0 8px 24px rgba(var(--a1r),.12)}
.shop-item.owned{border-color:rgba(var(--gn),.4);background:rgba(74,191,122,.04)}
.shop-item.equipped{border-color:var(--a1);background:rgba(var(--a1r),.06);box-shadow:0 0 16px rgba(var(--a1r),.12)}
.shop-item-preview{width:60px;height:90px;display:flex;align-items:center;justify-content:center}
.shop-item-name{font-size:12px;font-weight:600;color:var(--tx);text-align:center}
.shop-item-price{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700}
.shop-item-price.coins{color:#f0c840}
.shop-item-price.gems{color:#88c0ff}
.shop-item-badge{position:absolute;top:7px;right:7px;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.shop-item-badge.owned-b{background:rgba(74,191,122,.2);color:var(--gn);border:1px solid rgba(74,191,122,.3)}
.shop-item-badge.equip-b{background:rgba(var(--a1r),.2);color:var(--a1);border:1px solid rgba(var(--a1r),.35)}
.shop-item-badge.new-b{background:rgba(224,82,82,.18);color:#ff6b6b;border:1px solid rgba(224,82,82,.3)}
/* bundle cards */
.shop-bundles{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.shop-bundle{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--rl);cursor:pointer;transition:all .25s}
.shop-bundle:hover{background:var(--bg3);border-color:rgba(var(--a1r),.35);transform:translateX(3px)}
.shop-bundle-ico{font-size:32px;flex-shrink:0}
.shop-bundle-info{flex:1}
.shop-bundle-name{font-size:14px;font-weight:600;color:var(--tx)}
.shop-bundle-desc{font-size:11px;color:var(--tx3);margin-top:2px}
.shop-bundle-price{font-size:14px;font-weight:700;color:#88c0ff;text-align:right;flex-shrink:0}

/* ════════════════════════════════════
   MOBILE TOUCH DRAG — DROP ZONES
════════════════════════════════════ */
.touch-drag-ghost{position:fixed;pointer-events:none;z-index:9000;opacity:.85;transition:none;transform:translate(-50%,-50%)}
.player-hand-wrap{position:relative}
.touch-drop-hint{position:absolute;top:-32px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--a1);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.touch-drop-hint.on{opacity:1}

/* ════════════════════════════════════
   GAME HUD IMPROVEMENTS
════════════════════════════════════ */
.g-reward-bar{display:flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--bd);flex-shrink:0}
.g-econ-pill{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:4px 8px;border-radius:12px}
.g-econ-pill.c{color:#f0c840;background:rgba(212,160,23,.1)}
.g-econ-pill.g{color:#88c0ff;background:rgba(100,160,255,.1)}
.g-econ-pill svg{width:12px;height:12px;flex-shrink:0}

/* ════════════════════════════════════
   WIN MODAL ENHANCEMENT
════════════════════════════════════ */
.win-reward-row{display:flex;gap:10px;justify-content:center;margin-top:4px}
.win-rew{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700}
.win-rew.coins{background:rgba(212,160,23,.15);color:#f0c840;border:1px solid rgba(212,160,23,.3)}
.win-rew.gems{background:rgba(100,160,255,.15);color:#88c0ff;border:1px solid rgba(100,160,255,.3)}

/* ════════════════════════════════════
   NOTIFICATION TOAST
════════════════════════════════════ */
#toast-wrap{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:8000;display:flex;flex-direction:column;gap:8px;pointer-events:none;align-items:center}
.toast{padding:11px 20px;border-radius:22px;font-size:12px;font-weight:600;color:var(--tx);background:rgba(12,18,36,.96);border:1px solid rgba(var(--a1r),.2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);animation:toastIn .35s ease,toastOut .4s ease 2.4s forwards;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

/* ════════════════════════════════════
   HOME SCREEN — DAILY BUTTON
════════════════════════════════════ */
.hb-daily{background:rgba(212,160,23,.09);border-color:rgba(212,160,23,.25)}
.hb-daily:hover{background:rgba(212,160,23,.18);border-color:rgba(212,160,23,.5);transform:translateY(-2px)}
.hb-daily .hbico{background:rgba(212,160,23,.14);color:#f0c840}
.daily-badge{position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;background:#e05252;border:2px solid var(--bg0)}

/* ════════════════════════════════════
   TILE SKINS
════════════════════════════════════ */

body.skin-green .tw:not(.afd) svg rect:first-child{fill:#041408!important;stroke:#4abf7a!important}


/* ════════════════════════════════════
   SHOP OVERHAUL v2
════════════════════════════════════ */
/* REMOVE OLD 2D SHOP ITEM STYLES */
.shop-items{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}

/* 3D CARD STYLE */
.shop-item{
  background:linear-gradient(160deg,var(--bg3) 0%,var(--bg2) 100%);
  border:1px solid var(--bd);
  border-radius:18px;
  padding:16px 10px 14px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;
  transition:all .28s cubic-bezier(.34,1.2,.64,1);
  position:relative;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06);
}
.shop-item::before{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(160deg,rgba(255,255,255,.05) 0%,transparent 60%);
  pointer-events:none;
}
.shop-item:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 12px 36px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
  border-color:rgba(var(--a1r),.5);
}
.shop-item:active{transform:translateY(-2px) scale(1.01)}
.shop-item.owned{
  border-color:rgba(74,191,122,.35);
  background:linear-gradient(160deg,rgba(74,191,122,.08) 0%,var(--bg2) 100%);
}
.shop-item.equipped{
  border-color:rgba(var(--a1r),.6);
  background:linear-gradient(160deg,rgba(var(--a1r),.14) 0%,var(--bg2) 100%);
  box-shadow:0 0 24px rgba(var(--a1r),.18),0 4px 18px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);
}
.shop-item.equipped::after{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(160deg,rgba(var(--a1r),.08) 0%,transparent 50%);
  pointer-events:none;
}
.shop-item-preview{
  width:56px;height:84px;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));
